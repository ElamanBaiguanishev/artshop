services:
  postgres:
    image: postgres:17-alpine
    container_name: artshop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: artshop
      POSTGRES_PASSWORD: artshop
      POSTGRES_DB: artshop
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U artshop']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: artshop-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-совместимое хранилище для оригиналов и производных изображений
  minio:
    image: minio/minio:latest
    container_name: artshop-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: artshop
      MINIO_ROOT_PASSWORD: artshop123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 10

  # создаёт бакет при старте и выходит
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 artshop artshop123 &&
      mc mb --ignore-existing local/artshop-media &&
      mc anonymous set download local/artshop-media
      "

volumes:
  pgdata:
  redisdata:
  miniodata:
